<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Data Analyst Assessment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            AI Data Analyst Assessment
        </a>
        <div class="ms-auto">
            <a class="nav-link d-inline-block text-white me-3" href="/">Home</a>
            <a class="nav-link d-inline-block text-white" href="/login">Login</a>
        </div>
    </div>
</nav>

<section class="auth-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card card-custom auth-card p-4 p-md-5">
                    <h2 class="text-center mb-2">Welcome Back</h2>
                    <p class="text-center text-muted mb-4">
                        Sign in to continue your assessment
                    </p>

                    <!-- Shows any login error message -->
                    <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email Address</label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                placeholder="Enter your email"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="Enter your password"
                                required
                            >
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="small text-primary">Forgot password?</a>
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-primary w-100">
                            Login
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0 small text-muted">
                        New candidate?
                        <a href="/register" class="text-primary fw-semibold">Create an Account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const errorBox = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        errorBox.classList.add('d-none');
        errorBox.textContent = '';

        const payload = {
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
        };

        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        try {
            const response = await fetch('/candidate/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('candidate_id', result.candidate_id);
                localStorage.setItem('candidate_name', result.full_name || '');
                window.location.href = '/home';
            } else {
                errorBox.textContent = result.detail || 'Login failed. Please check your email and password.';
                errorBox.classList.remove('d-none');
            }
        } catch (error) {
            console.error(error);
            errorBox.textContent = 'Unable to connect to the backend server. Is it running?';
            errorBox.classList.remove('d-none');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    });
</script>

</body>
</html>
